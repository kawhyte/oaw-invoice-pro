name: Supabase keep-alive

# Supabase free tier pauses a project after ~7 days without API activity.
# This pings BOTH projects (production + oaw-staging) every 3 days so the
# inactivity timer never gets close. The Vercel cron in vercel.json remains
# as a second, independent keep-alive for production only.
on:
  schedule:
    # 06:17 UTC every 3rd day. Odd minute on purpose: GitHub delays/skips
    # on-the-hour cron runs under load.
    - cron: '17 6 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production Supabase
        run: |
          curl --fail --silent --show-error \
            -H "apikey: ${{ secrets.SUPABASE_PROD_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PROD_ANON_KEY }}" \
            "${{ secrets.SUPABASE_PROD_URL }}/rest/v1/projects?select=id&limit=1" \
            -o /dev/null -w "production HTTP %{http_code}\n"

      - name: Ping staging Supabase (oaw-staging)
        # always() so staging is still pinged even if the production step failed
        if: always()
        run: |
          curl --fail --silent --show-error \
            -H "apikey: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_STAGING_ANON_KEY }}" \
            "${{ secrets.SUPABASE_STAGING_URL }}/rest/v1/projects?select=id&limit=1" \
            -o /dev/null -w "staging HTTP %{http_code}\n"
